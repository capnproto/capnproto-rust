[package]
name = "bytestream"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[lib]
path = "lib.rs"

[build-dependencies]
capnpc = { path = "../../../capnpc" }

[dependencies]
capnp = { path = "../../../capnp" }
capnp-rpc = { path = "../.." }
futures = "0.3.0"
rand = "0.9.0"
sha2 = { version = "0.11.0" }
tokio = { version = "1.0.0", features = ["net", "rt", "time"] }
tokio-util = { version = "0.7.4", features = ["compat"] }

[lints]
workspace = true
